<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Kokoro — Join the Waitlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink: oklch(0.33 0.035 340);
    --ink-soft: oklch(0.52 0.03 340);
    --card: #ffffff;
    --line: oklch(0.92 0.02 340);
    /* accent vars get set on .stage by the active palette */
    --pink: oklch(0.74 0.14 352);
    --pink-deep: oklch(0.63 0.18 352);
    --lav: oklch(0.71 0.12 300);
    --mint: oklch(0.86 0.08 170);
    --peach: oklch(0.88 0.09 55);
    --bg1: oklch(0.985 0.012 352);
    --bg2: oklch(0.95 0.022 320);
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html,body{ height: 100%; }
  body{
    font-family: "M PLUS Rounded 1c", system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg2);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #root{ min-height: 100%; }

  .stage{
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background:
      radial-gradient(120% 90% at 50% -10%, var(--bg1), var(--bg2));
    position: relative;
    overflow: hidden;
  }
  /* soft floating blobs in the backdrop */
  .blob{ position: absolute; border-radius: 50%; filter: blur(6px); opacity: .5; pointer-events: none; }
  .glyph{ position: absolute; pointer-events: none; opacity: .5; font-size: 26px; user-select: none; }

  .phone{
    width: 100%;
    max-width: 440px;
    background: var(--card);
    position: relative;
    z-index: 2;
    min-height: 100vh;
    box-shadow: 0 30px 80px -30px oklch(0.55 0.16 350 / .45);
    overflow: hidden;
    padding-bottom: 30px;
  }

  /* ---- header ---- */
  .topbar{
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px 6px;
  }
  .wordmark{ display: flex; align-items: baseline; gap: 6px; }
  .wordmark b{
    font-family: "Baloo 2", cursive; font-weight: 800; font-size: 26px;
    letter-spacing: -.01em; color: var(--pink-deep);
    background: linear-gradient(100deg, var(--pink-deep), var(--lav));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .wordmark .kanji{ font-size: 19px; font-weight: 700; color: var(--lav); -webkit-text-fill-color: var(--lav); }
  .pill{
    font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    color: var(--pink-deep); background: oklch(0.96 0.03 352);
    border: 1.5px solid oklch(0.9 0.05 352);
    padding: 6px 11px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px;
  }
  .pill .dot{ width: 7px; height: 7px; border-radius: 50%; background: var(--pink); box-shadow: 0 0 0 0 var(--pink); animation: ping 1.6s infinite; }
  @keyframes ping{ 0%{ box-shadow: 0 0 0 0 oklch(0.74 0.14 352 / .6);} 70%{ box-shadow: 0 0 0 8px oklch(0.74 0.14 352 / 0);} 100%{ box-shadow: 0 0 0 0 oklch(0.74 0.14 352 / 0);} }

  section{ padding: 0 22px; }

  /* ---- hero ---- */
  .hero{ padding-top: 30px; position: relative; }
  .hero h1{
    font-family: "Baloo 2", cursive; font-weight: 800; font-size: 42px; line-height: 1.02;
    letter-spacing: -.02em; color: var(--ink); text-wrap: balance;
  }
  .hero h1 .hl{
    background: linear-gradient(100deg, var(--pink-deep), var(--lav));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero p.sub{
    margin-top: 16px; font-size: 16.5px; line-height: 1.5; color: var(--ink-soft);
    font-weight: 500; max-width: 35ch; text-wrap: pretty;
  }
  .proof{
    margin-top: 20px; display: flex; align-items: center; gap: 10px;
    font-size: 13.5px; font-weight: 700; color: var(--ink-soft);
  }
  .avatars{ display: flex; }
  .avatars span{
    width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid var(--card);
    margin-left: -9px; display: grid; place-items: center; font-size: 13px;
  }
  .avatars span:first-child{ margin-left: 0; }

  .btn{
    -webkit-appearance: none; appearance: none; border: 0; cursor: pointer;
    font-family: "Baloo 2", cursive; font-weight: 700; font-size: 17px;
    color: #fff; padding: 16px 22px; border-radius: 20px; width: 100%;
    background: linear-gradient(100deg, var(--pink), var(--lav));
    box-shadow: 0 14px 26px -10px oklch(0.6 0.17 350 / .7);
    transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover{ transform: translateY(-2px); box-shadow: 0 18px 30px -10px oklch(0.6 0.17 350 / .75); }
  .btn:active{ transform: translateY(0); filter: brightness(.97); }
  .btn.ghost{
    background: oklch(0.97 0.02 352); color: var(--pink-deep);
    box-shadow: inset 0 0 0 1.5px oklch(0.9 0.05 352);
  }
  .cta-wrap{ margin-top: 26px; }
  .cta-note{ text-align: center; font-size: 12.5px; color: var(--ink-soft); margin-top: 10px; font-weight: 500; }

  /* ---- match visual ---- */
  .matchcard{
    margin: 30px 0 4px; position: relative; height: 230px;
  }
  .pcard{
    position: absolute; width: 170px; border-radius: 24px; background: var(--card);
    box-shadow: 0 18px 40px -18px oklch(0.55 0.14 340 / .55);
    border: 1px solid var(--line); overflow: hidden;
  }
  .pcard .ph{ height: 124px; }
  .pcard .meta{ padding: 10px 12px 13px; }
  .pcard .meta b{ font-family:"Baloo 2"; font-size: 16px; display: block; }
  .pcard .meta small{ font-size: 12px; color: var(--ink-soft); font-weight: 600; }
  .pcard.a{ left: 2px; top: 18px; transform: rotate(-7deg); }
  .pcard.b{ right: 2px; top: 0; transform: rotate(6deg); }
  .matchbadge{
    position: absolute; left: 50%; top: 52%; transform: translate(-50%,-50%) rotate(-3deg);
    z-index: 3; background: linear-gradient(100deg, var(--pink), var(--lav));
    color: #fff; font-family:"Baloo 2"; font-weight: 800; font-size: 18px;
    padding: 12px 18px; border-radius: 16px; box-shadow: 0 14px 26px -10px oklch(0.6 0.17 350 / .8);
    border: 2.5px solid #fff; white-space: nowrap;
  }

  .ph{
    background-image: repeating-linear-gradient(135deg, oklch(0.93 0.03 340) 0 9px, oklch(0.96 0.02 340) 9px 18px);
    display: grid; place-items: center; color: oklch(0.6 0.04 340);
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; letter-spacing: .02em;
  }
  .ava{ height: 124px; display: grid; place-items: center; color: rgba(255,255,255,.94);
    font-family: "Baloo 2"; font-weight: 800; font-size: 46px; text-shadow: 0 2px 10px rgba(0,0,0,.3); }

  /* ---- section heading ---- */
  .eyebrow{
    font-size: 12.5px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
    color: var(--pink-deep); display: flex; align-items: center; gap: 8px;
  }
  .eyebrow::before{ content:""; width: 18px; height: 2.5px; border-radius: 2px; background: var(--pink); }
  h2.title{
    font-family:"Baloo 2"; font-weight: 800; font-size: 27px; line-height: 1.1;
    margin-top: 10px; letter-spacing: -.01em; text-wrap: balance;
  }
  .block{ margin-top: 46px; }

  /* ---- feature list ---- */
  .feat{ margin-top: 18px; display: flex; flex-direction: column; gap: 11px; }
  .feat .row{
    display: flex; gap: 13px; align-items: flex-start;
    background: oklch(0.985 0.01 340); border: 1px solid var(--line);
    border-radius: 18px; padding: 14px 15px;
  }
  .feat .ic{
    flex: none; width: 42px; height: 42px; border-radius: 13px; display: grid; place-items: center;
    font-size: 21px; background: var(--card); box-shadow: 0 6px 14px -8px oklch(0.55 0.12 340 / .6);
  }
  .feat .row b{ font-family:"Baloo 2"; font-size: 16px; display: block; }
  .feat .row p{ font-size: 13.5px; color: var(--ink-soft); font-weight: 500; line-height: 1.4; margin-top: 2px; }

  /* ---- sample profile ---- */
  .profile{
    margin-top: 20px; border-radius: 26px; overflow: hidden; background: var(--card);
    border: 1px solid var(--line); box-shadow: 0 22px 50px -24px oklch(0.55 0.14 340 / .55);
  }
  .profile .cover{ height: 178px; position: relative; }
  .profile .cover .nm{
    position: absolute; left: 16px; bottom: 14px; color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,.45);
  }
  .profile .cover .nm b{ font-family:"Baloo 2"; font-size: 23px; }
  .profile .cover .nm span{ font-size: 14px; font-weight: 700; opacity: .95; }
  .profile .body{ padding: 16px; display: flex; flex-direction: column; gap: 15px; }
  .lbl{ font-size: 11.5px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
  .chips{ display: flex; flex-wrap: wrap; gap: 7px; }
  .chip{
    font-size: 13px; font-weight: 700; padding: 7px 12px; border-radius: 999px;
    background: oklch(0.96 0.03 352); color: var(--pink-deep); border: 1px solid oklch(0.9 0.04 352);
  }
  .chip.lav{ background: oklch(0.96 0.025 300); color: oklch(0.5 0.13 300); border-color: oklch(0.9 0.04 300); }
  .chip.mint{ background: oklch(0.95 0.04 170); color: oklch(0.46 0.08 175); border-color: oklch(0.89 0.05 170); }
  .promptbox{
    background: linear-gradient(120deg, oklch(0.97 0.025 352), oklch(0.97 0.02 300));
    border: 1px solid var(--line); border-radius: 16px; padding: 13px 15px;
  }
  .promptbox .q{ font-size: 12.5px; font-weight: 700; color: var(--ink-soft); }
  .promptbox .a{ font-family:"Baloo 2"; font-size: 17px; margin-top: 4px; line-height: 1.25; }

  /* ---- prompt examples ---- */
  .prompts{ margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
  .prompts .p{
    border: 1.5px dashed oklch(0.86 0.05 340); border-radius: 16px; padding: 13px 15px;
    font-family:"Baloo 2"; font-size: 15.5px; color: var(--ink);
    background: oklch(0.99 0.008 340); display: flex; gap: 9px; align-items: center;
  }
  .prompts .p span{ opacity: .7; }

  /* ---- join form ---- */
  .joincard{
    margin-top: 18px; border-radius: 26px; padding: 22px 20px 24px;
    background: linear-gradient(160deg, oklch(0.97 0.03 352), oklch(0.97 0.025 300));
    border: 1px solid oklch(0.9 0.04 340);
    box-shadow: 0 22px 50px -26px oklch(0.55 0.14 340 / .5);
  }
  .field{ margin-top: 12px; }
  .field label{ font-size: 13px; font-weight: 800; display: block; margin-bottom: 6px; color: var(--ink); }
  .field input{
    width: 100%; font-family: inherit; font-size: 16px; font-weight: 600; color: var(--ink);
    padding: 14px 15px; border-radius: 15px; border: 1.5px solid oklch(0.88 0.03 340);
    background: var(--card); transition: border-color .15s ease, box-shadow .15s ease;
  }
  .field input::placeholder{ color: oklch(0.7 0.02 340); font-weight: 500; }
  .field input:focus{ outline: none; border-color: var(--pink); box-shadow: 0 0 0 4px oklch(0.74 0.14 352 / .18); }
  .field input.err{ border-color: oklch(0.62 0.2 25); box-shadow: 0 0 0 4px oklch(0.62 0.2 25 / .15); }
  .errmsg{ color: oklch(0.55 0.2 25); font-size: 12.5px; font-weight: 700; margin-top: 6px; }
  .spam{
    display: flex; gap: 9px; align-items: flex-start; margin-top: 14px;
    font-size: 12.5px; color: var(--ink-soft); font-weight: 600; line-height: 1.45;
  }
  .spam .s{ flex: none; font-size: 15px; margin-top: -1px; }

  /* confirmation */
  .done{ text-align: center; padding: 12px 4px 6px; }
  .done .burst{ font-size: 46px; line-height: 1; animation: pop .5s cubic-bezier(.2,1.4,.4,1); }
  @keyframes pop{ 0%{ transform: scale(0); } 100%{ transform: scale(1); } }
  .done h3{ font-family:"Baloo 2"; font-size: 25px; margin-top: 10px; }
  .done .num{
    display: inline-block; margin-top: 14px; font-family:"Baloo 2"; font-weight: 800; font-size: 15px;
    color: var(--pink-deep); background: var(--card); padding: 9px 16px; border-radius: 999px;
    border: 1.5px solid oklch(0.9 0.04 352);
  }
  .done p{ font-size: 14px; color: var(--ink-soft); font-weight: 600; margin-top: 14px; line-height: 1.5; }

  /* ---- footer ---- */
  footer{ margin-top: 46px; padding: 26px 22px 8px; border-top: 1px solid var(--line); text-align: center; }
  .socials{ display: flex; justify-content: center; gap: 10px; }
  .socials a{
    width: 42px; height: 42px; border-radius: 14px; display: grid; place-items: center;
    background: oklch(0.97 0.02 352); color: var(--pink-deep); text-decoration: none;
    font-weight: 800; font-size: 15px; border: 1px solid oklch(0.92 0.03 352);
    transition: transform .15s ease, background .15s ease;
  }
  .socials a:hover{ transform: translateY(-2px); background: oklch(0.94 0.04 352); }
  .footmark{ font-family:"Baloo 2"; font-weight: 800; font-size: 18px; color: var(--pink-deep); margin-top: 20px; }
  .fineprint{ font-size: 12px; color: var(--ink-soft); font-weight: 500; margin-top: 6px; }

  .nowrap{ white-space: nowrap; }

  /* ---- logo ---- */
  .brand{ display: flex; align-items: center; gap: 11px; }
  .appicon-sm{ width: 36px; height: 36px; border-radius: 11px; display: block; box-shadow: 0 6px 14px -6px oklch(0.5 0.16 320 / .55); }
  .hero-icon{ width: 88px; height: 88px; border-radius: 24px; display: block; margin-bottom: 22px; box-shadow: 0 22px 40px -14px oklch(0.5 0.17 318 / .6); }

  /* ---- red thread of fate ---- */
  :root{ --thread: oklch(0.50 0.19 25); }
  .thread{ position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: visible; }
  .thread path{ fill: none; stroke: var(--thread); stroke-linecap: round; vector-effect: non-scaling-stroke; filter: drop-shadow(0 2px 3px oklch(0.38 0.12 20 / .4)); }
  .thread path.sheen{ stroke: oklch(0.70 0.15 25); opacity: .5; filter: none; }
  .pcard{ z-index: 2; }
  .knot-heart{ position: absolute; left: 50%; bottom: 6px; transform: translateX(-50%); color: var(--thread); font-size: 19px; z-index: 2; text-shadow: 0 1px 2px oklch(0.4 0.12 20 / .45); }
  .fate-cap{ display: flex; align-items: center; justify-content: center; gap: 9px; margin-top: 16px; font-size: 12.5px; font-weight: 700; color: var(--thread); }
  .fate-cap .jp{ font-weight: 800; letter-spacing: .05em; }
  .fate-cap::before, .fate-cap::after{ content: ""; width: 22px; height: 2px; border-radius: 2px; background: var(--thread); opacity: .42; }

  /* ---- auto-match spotlight ---- */
  .automatch{ margin-top: 22px; border-radius: 24px; padding: 23px 21px; color: #fff; position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--pink), var(--lav));
    box-shadow: 0 24px 48px -20px oklch(0.55 0.18 340 / .75); }
  .automatch::after{ content: ""; position: absolute; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,.15); top: -74px; right: -54px; }
  .automatch::before{ content: "✨"; position: absolute; font-size: 130px; line-height: 1; opacity: .14; right: 8px; bottom: -24px; transform: rotate(-8deg); }
  .automatch .tag{ position: relative; z-index: 1; display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; background: rgba(255,255,255,.24); padding: 6px 11px; border-radius: 999px; }
  .automatch h3{ position: relative; z-index: 1; font-family: "Baloo 2"; font-weight: 800; font-size: 26px; margin-top: 13px; letter-spacing: -.01em; }
  .automatch p{ position: relative; z-index: 1; font-size: 14.5px; font-weight: 600; line-height: 1.5; margin-top: 8px; opacity: .96; max-width: 31ch; text-wrap: pretty; }
  .amrow{ position: relative; z-index: 1; display: flex; align-items: center; gap: 13px; margin-top: 18px; }
  .ambtn{ display: inline-flex; align-items: center; gap: 9px; background: #fff; color: var(--pink-deep); font-family: "Baloo 2"; font-weight: 800; font-size: 16px; padding: 13px 19px; border-radius: 15px; box-shadow: 0 10px 20px -10px rgba(0,0,0,.4); animation: ampulse 2.3s ease-in-out infinite; }
  @keyframes ampulse{ 0%,100%{ box-shadow: 0 10px 20px -10px rgba(0,0,0,.4), 0 0 0 0 rgba(255,255,255,.55); } 55%{ box-shadow: 0 10px 20px -10px rgba(0,0,0,.4), 0 0 0 11px rgba(255,255,255,0); } }
  .ambtn .spark{ display: inline-block; animation: spin 3.6s linear infinite; }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .amnote{ font-size: 12.5px; font-weight: 700; opacity: .88; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#f7c9da"/>
    <text x="50" y="62" font-size="42" text-anchor="middle" fill="#c84d7e" font-family="sans-serif" font-weight="bold">心</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app.jsx"></script>
</body>
